# Main Agent Configuration for AEGIS
# Add/merge with existing config if present

trading_mode: DATA_COLLECTION
symbols: []
start_date: 2020-01-01
end_date: 2020-12-31
enable_ml: true
backtest_mode: false

# ...other config fields as needed...
live_mode: true
# Indicates the system is running in live (not backtest) mode

data_collection_phase: true
